name: Gerar e Publicar Boletim Geral

on:
  schedule:
    # 08h BRT = 11h UTC
    - cron: '0 11 * * *'
    # 17h BRT = 20h UTC
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install google-genai

      - name: Gerar news-data.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERRO: GEMINI_API_KEY nao definida."
            exit 1
          fi
          python generate_news.py

      - name: Verificar resultado
        run: |
          python3 -c "
          import json
          with open('news-data.json') as f:
            d = json.load(f)
          total = len(d.get('noticias',[]))
          cats  = d.get('por_categoria', {})
          print(f'Edicao: {d.get(\"edition_label\",\"?\")}')
          print(f'Total noticias: {total}')
          for k,v in cats.items():
              print(f'  {k}: {v}')
          "

      - name: Commitar news-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json
          git diff --cached --quiet || git commit -m "boletim: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
